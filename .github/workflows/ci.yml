name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  formatting:
    runs-on: ubuntu-latest
    environment: linting
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.15
      - run: bun i --frozen-lockfile
      - run: bun run format:check

  linting:
    runs-on: ubuntu-latest
    environment: linting
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.15
      - run: bun i --frozen-lockfile
      - run: bun run lint

  test:
    runs-on: ubuntu-latest
    environment: linting
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.15
      - run: bun i --frozen-lockfile
      - name: Run unit + integration tests
        run: bun run test
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          if-no-files-found: warn

  e2e:
    runs-on: ubuntu-latest
    needs: test
    environment: linting
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.15
      - run: bun i --frozen-lockfile
      - name: Build agent bundle
        run: cd apps/agent && bun run build
      - name: Install Playwright browsers
        run: cd apps/website && bunx playwright install --with-deps chromium
      - name: Run E2E tests
        run: cd apps/website && bun run e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/website/playwright-report/
          retention-days: 14
          if-no-files-found: warn

  test-docker-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: website
            dockerfile: apps/website/Dockerfile
          - name: agent
            dockerfile: apps/agent/Dockerfile
          - name: docs
            dockerfile: apps/docs/Dockerfile
          - name: migrator
            dockerfile: packages/db/Dockerfile
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: build
        run: docker build -t ${{ matrix.name }} -f ${{ matrix.dockerfile }} .
