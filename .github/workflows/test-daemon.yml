name: test-daemon
on:
  pull_request:
    paths:
      - .github/workflows/test-daemon.yml
      - apps/daemon/**
      - packages/**
  workflow_dispatch:

jobs:
  test-docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: build
        run: docker build -t daemon -f apps/daemon/Dockerfile .
  verify-bundle-deps:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: setup bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.2.15
      - name: install dependencies
        run: bun install
      - name: verify daemon bundle has no forbidden deps
        run: |
          cd apps/daemon && bun run build
          ! grep -E 'require\("(@mon/db|@mon/config|postgres|drizzle-orm|smol-toml)"\)' dist/daemon.cjs
